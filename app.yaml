name: fixr-pro
region: nyc

static_sites:
  - name: web
    github:
      branch: main
      deploy_on_push: true
      repo: castilhosdiogo-glitch/fixr-pro-rede
    source_dir: /
    build_command: npm ci && npm run build
    output_dir: dist
    catchall_document: index.html
    routes:
      - path: /
    envs:
      - key: NODE_ENV
        value: "production"
        scope: BUILD_TIME
      - key: VITE_SUPABASE_URL
        value: ${VITE_SUPABASE_URL}
        scope: BUILD_TIME
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        value: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        scope: BUILD_TIME
      - key: VITE_SUPABASE_PROJECT_ID
        value: ${VITE_SUPABASE_PROJECT_ID}
        scope: BUILD_TIME
      - key: VITE_SENTRY_DSN
        value: ${VITE_SENTRY_DSN}
        scope: BUILD_TIME
      - key: VITE_VAPID_PUBLIC_KEY
        value: ${VITE_VAPID_PUBLIC_KEY}
        scope: BUILD_TIME
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        value: ${VITE_STRIPE_PUBLISHABLE_KEY}
        scope: BUILD_TIME
