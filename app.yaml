name: fixr-pro
region: nyc

services:
  - name: web
    github:
      branch: main
      deploy_on_push: true
      repo: PREENCHER/SEU-REPO-AQUI
    source_dir: /
    build_command: npm ci && npm run build
    run_command: npm run preview -- --host 0.0.0.0 --port 8080
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    http_port: 8080
    routes:
      - path: /
    health_check:
      http_path: /
      initial_delay_seconds: 10
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: NODE_ENV
        value: "production"
        scope: BUILD_TIME
      - key: VITE_SUPABASE_URL
        value: ${VITE_SUPABASE_URL}
        scope: BUILD_TIME
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        value: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        scope: BUILD_TIME
      - key: VITE_SUPABASE_PROJECT_ID
        value: ${VITE_SUPABASE_PROJECT_ID}
        scope: BUILD_TIME
      - key: VITE_SENTRY_DSN
        value: ${VITE_SENTRY_DSN}
        scope: BUILD_TIME
      - key: VITE_VAPID_PUBLIC_KEY
        value: ${VITE_VAPID_PUBLIC_KEY}
        scope: BUILD_TIME
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        value: ${VITE_STRIPE_PUBLISHABLE_KEY}
        scope: BUILD_TIME
